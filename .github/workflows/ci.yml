name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read          # least privilege

env:
  CARGO_TERM_COLOR: always

# Phase-0 CI: build + test are the blocking gates. Format, lint, and the supply-chain
# scans run and report but are non-blocking for now (continue-on-error) — see the tracking
# issue to make them blocking once the code is formatted and dependencies are triaged.
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4          # TODO: pin to a commit SHA (std-supplychain)
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format (report-only for now)
        continue-on-error: true
        run: cargo fmt --all -- --check
      - name: Clippy (report-only for now)
        continue-on-error: true
        run: cargo clippy --workspace --all-targets --all-features
      - name: Test (blocking)
        run: cargo test --workspace --all-features

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4          # TODO: pin to a commit SHA
      - uses: dtolnay/rust-toolchain@stable
      - name: Install audit/deny/sbom tools (prebuilt — fast, no MSRV constraint)
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny,cargo-cyclonedx
      - name: Vulnerability audit (report-only for now)
        continue-on-error: true
        run: cargo audit
      - name: License & dependency policy — deny.toml (report-only for now)
        continue-on-error: true
        run: cargo deny check
      - name: SBOM (CycloneDX)
        continue-on-error: true
        run: cargo cyclonedx --format json

# TODO before first release: format the codebase + make fmt/clippy/audit/deny BLOCKING;
# add secret scanning (e.g. gitleaks); sign artifacts + provenance (cosign/SLSA);
# pin every action by commit SHA.
