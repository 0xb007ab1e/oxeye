# cargo-deny: supply-chain + license policy gate (run in CI).
# Enforces the project's permissive-only license strategy and blocks vulnerable/yanked deps.

[advisories]
version = 2
yanked = "deny"
# RustSec advisory DB vulnerabilities are denied by default in cargo-deny v2.

[licenses]
version = 2
confidence-threshold = 0.9
# Permissive licenses only for *linked* dependencies. Copyleft (GPL/LGPL) is deliberately
# absent: the speech stack (eSpeak NG / speech-dispatcher) is used over IPC, and liblouis
# (LGPL, later) is dynamically linked — neither is a Cargo dependency, so neither appears here.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    # Weak (file-level) copyleft, OSI-approved. Only a transitive dep (option-ext, via
    # directories) uses it, unmodified — acceptable for a permissive app; MPL obligations
    # apply only to modified MPL files, which we have none of.
    "MPL-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Allow path/workspace deps without an explicit version (our internal oxeye-core).
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
